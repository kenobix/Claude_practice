<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D0D12; font-family: 'DM Sans', sans-serif; padding: 24px; }
  .row { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
  .logo-container {
    display: flex; flex-direction: column; gap: 8px; align-items: flex-start;
  }
  .logo-label { font-size: 10px; color: #5A5A72; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
  .logo-bg-light {
    background: #F0EEF8; border-radius: 6px; padding: 12px 16px;
    display: flex; align-items: center;
  }
  /* Inline SVG logo mark */
  .kmark { display: flex; align-items: center; gap: 10px; }
  .kmark-svg { width: 28px; height: 32px; }
  .kmark-word { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
  .subline { font-size: 11px; color: #5A5A72; letter-spacing: 0.04em; margin-top: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="logo-container">
      <div class="logo-label">Dark bg</div>
      <div class="kmark">
        <svg class="kmark-svg" viewBox="0 0 28 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="4" height="32" fill="#6C63FF"/>
          <path d="M4 16 L18 0 L24 0 L10 16Z" fill="#6C63FF"/>
          <path d="M4 16 L18 32 L24 32 L10 16Z" fill="#A78BFA"/>
        </svg>
        <div>
          <div class="kmark-word" style="color:#F0EEF8;">kenshin</div>
          <div class="subline">IT Engineer &amp; Consultant</div>
        </div>
      </div>
    </div>
    <div class="logo-container">
      <div class="logo-label">Light bg</div>
      <div class="logo-bg-light">
        <div class="kmark">
          <svg class="kmark-svg" viewBox="0 0 28 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="4" height="32" fill="#6C63FF"/>
            <path d="M4 16 L18 0 L24 0 L10 16Z" fill="#6C63FF"/>
            <path d="M4 16 L18 32 L24 32 L10 16Z" fill="#A78BFA"/>
          </svg>
          <div>
            <div class="kmark-word" style="color:#0D0D12;">kenshin</div>
            <div class="subline" style="color:#8B8A9E;">IT Engineer &amp; Consultant</div>
          </div>
        </div>
      </div>
    </div>
    <div class="logo-container">
      <div class="logo-label">Mark only</div>
      <svg width="40" height="46" viewBox="0 0 28 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="4" height="32" fill="#6C63FF"/>
        <path d="M4 16 L18 0 L24 0 L10 16Z" fill="#6C63FF"/>
        <path d="M4 16 L18 32 L24 32 L10 16Z" fill="#A78BFA"/>
      </svg>
    </div>
  </div>
</body>
</html>
