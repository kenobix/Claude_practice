<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D0D12; padding: 20px 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; border-bottom: 1px solid #1E1E2A; padding-bottom: 14px; }
  .row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .meta { width: 100px; flex-shrink: 0; }
  .tag { font-size: 10px; font-weight: 600; color: #5A5A72; letter-spacing: 0.08em; text-transform: uppercase; font-family: monospace; }
  .size { font-size: 10px; color: #3D3D52; margin-top: 2px; font-family: monospace; }
  .sample { font-family: 'Syne', sans-serif; color: #F0EEF8; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta"><div class="tag">h1 / 60px</div><div class="size">700 · −0.03em</div></div>
    <div class="sample" style="font-size:42px; font-weight:700; letter-spacing:-0.03em; line-height:1.1;">Strategy</div>
  </div>
  <div class="row">
    <div class="meta"><div class="tag">h2 / 48px</div><div class="size">600 · −0.01em</div></div>
    <div class="sample" style="font-size:32px; font-weight:600; letter-spacing:-0.01em; line-height:1.15;">Systems thinking</div>
  </div>
  <div class="row">
    <div class="meta"><div class="tag">h3 / 30px</div><div class="size">600 · −0.01em</div></div>
    <div class="sample" style="font-size:24px; font-weight:600; letter-spacing:-0.01em; line-height:1.25;">Requirements analysis</div>
  </div>
  <div class="row">
    <div class="meta"><div class="tag">h4 / 24px</div><div class="size">600 · 0em</div></div>
    <div class="sample" style="font-size:18px; font-weight:600; letter-spacing:0; line-height:1.3;">Organizational change</div>
  </div>
</body>
</html>
