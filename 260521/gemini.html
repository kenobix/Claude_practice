<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #111; }
    .model-badge {
      font-size: 12px;
      background: #e8f0fe;
      border-radius: 12px;
      padding: 4px 10px;
      color: #1a73e8;
    }
    #settings-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
    }
    #settings-btn:hover { background: #f5f5f5; }

    #settings-panel {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px;
      display: none;
      flex-shrink: 0;
    }
    #settings-panel.open { display: block; }
    .settings-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .settings-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
    .settings-field label { font-size: 12px; color: #666; font-weight: 500; }
    .settings-field input, .settings-field select {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
    }
    .settings-field input:focus, .settings-field select:focus { border-color: #1a73e8; }
    #save-settings {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    #save-settings:hover { background: #1557b0; }
    .settings-note {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 800px;
      width: 100%;
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .message.user .avatar { background: #1a73e8; color: #fff; }
    .message.assistant .avatar { background: #e8f0fe; color: #1a73e8; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: calc(100% - 50px);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: #fff;
      color: #111;
      border: 1px solid #e5e5e5;
      border-bottom-left-radius: 4px;
    }
    .bubble.error { background: #fff3f3; color: #c0392b; border-color: #f5c6c6; }

    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: #888;
      text-align: center;
      padding: 32px;
    }
    #welcome .icon { font-size: 48px; }
    #welcome h2 { font-size: 20px; color: #444; }
    #welcome p { font-size: 14px; line-height: 1.6; }

    .typing .bubble { padding: 14px 18px; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 6px; height: 6px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    #input-area {
      background: #fff;
      border-top: 1px solid #e5e5e5;
      padding: 12px 16px;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 800px;
      margin: 0 auto;
    }
    #user-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 160px;
      min-height: 44px;
      line-height: 1.5;
      font-family: inherit;
    }
    #user-input:focus { border-color: #1a73e8; }
    #send-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    #send-btn:hover { background: #1557b0; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin-top: 6px;
    }

    #no-key-warning {
      background: #e8f0fe;
      border: 1px solid #aecbfa;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #1a73e8;
      margin-bottom: 8px;
      display: none;
    }
    #no-key-warning.show { display: block; }
  </style>
</head>
<body>

<header>
  <h1>✨ Gemini Chat</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <span class="model-badge" id="model-label">モデル未設定</span>
    <button id="settings-btn">⚙ 設定</button>
  </div>
</header>

<div id="settings-panel">
  <div class="settings-row">
    <div class="settings-field">
      <label>Gemini API Key</label>
      <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off">
    </div>
    <div class="settings-field" style="max-width:240px;">
      <label>モデル</label>
      <select id="model-select">
        <option value="gemini-2.5-flash">gemini-2.5-flash（推奨・無料枠）</option>
        <option value="gemini-2.5-flash-lite-preview-06-17">gemini-2.5-flash-lite（最大無料枠）</option>
        <option value="gemini-2.5-pro">gemini-2.5-pro</option>
      </select>
    </div>
    <button id="save-settings">保存</button>
  </div>
  <p class="settings-note">
    APIキーはブラウザのlocalStorageにのみ保存されます。サーバーには送信されません。<br>
    APIキーは <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a> から無料で取得できます（クレジットカード不要）。
  </p>
</div>

<div id="messages">
  <div id="welcome">
    <div class="icon">✨</div>
    <h2>Gemini Chat</h2>
    <p>右上の「⚙ 設定」からGemini APIキーを入力して会話を始めてください。<br>
    APIキーは <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a> から無料で取得できます。</p>
  </div>
</div>

<div id="input-area">
  <div id="no-key-warning" class="show">
    APIキーが設定されていません。右上の「⚙ 設定」から入力してください。
  </div>
  <div class="input-row">
    <textarea id="user-input" placeholder="メッセージを入力..." rows="1"></textarea>
    <button id="send-btn" disabled>➤</button>
  </div>
  <p class="input-hint">Shift+Enter で改行 / Enter で送信</p>
</div>

<script>
  const STORAGE_KEY = 'gemini_chat_settings';
  const API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models';

  const settingsBtn = document.getElementById('settings-btn');
  const settingsPanel = document.getElementById('settings-panel');
  const apiKeyInput = document.getElementById('api-key-input');
  const modelSelect = document.getElementById('model-select');
  const saveSettingsBtn = document.getElementById('save-settings');
  const messagesEl = document.getElementById('messages');
  const welcomeEl = document.getElementById('welcome');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const modelLabel = document.getElementById('model-label');
  const noKeyWarning = document.getElementById('no-key-warning');

  let apiKey = '';
  let model = 'gemini-2.5-flash';
  let history = [];
  let isLoading = false;

  function loadSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (saved.apiKey) { apiKey = saved.apiKey; apiKeyInput.value = saved.apiKey; }
      if (saved.model) { model = saved.model; modelSelect.value = saved.model; }
    } catch {}
    updateUI();
  }

  function saveSettings() {
    apiKey = apiKeyInput.value.trim();
    model = modelSelect.value;
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ apiKey, model }));
    settingsPanel.classList.remove('open');
    updateUI();
  }

  function updateUI() {
    const hasKey = !!apiKey;
    sendBtn.disabled = !hasKey || isLoading;
    noKeyWarning.classList.toggle('show', !hasKey);
    modelLabel.textContent = hasKey ? model : 'モデル未設定';
  }

  settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));
  saveSettingsBtn.addEventListener('click', saveSettings);

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
  });

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMessage(role, content, isError = false) {
    if (welcomeEl) welcomeEl.remove();
    const msgEl = document.createElement('div');
    msgEl.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'あ' : 'G';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error' : '');
    bubble.textContent = content;

    msgEl.appendChild(avatar);
    msgEl.appendChild(bubble);
    messagesEl.appendChild(msgEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTypingIndicator() {
    const msgEl = document.createElement('div');
    msgEl.className = 'message assistant typing';
    msgEl.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'G';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    msgEl.appendChild(avatar);
    msgEl.appendChild(bubble);
    messagesEl.appendChild(msgEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTypingIndicator() {
    document.getElementById('typing-indicator')?.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isLoading || !apiKey) return;

    userInput.value = '';
    userInput.style.height = 'auto';
    isLoading = true;
    updateUI();

    // Gemini API uses role "user" and "model"
    history.push({ role: 'user', parts: [{ text }] });
    addMessage('user', text);
    addTypingIndicator();

    try {
      const url = `${API_BASE}/${model}:generateContent?key=${apiKey}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: history }),
      });

      removeTypingIndicator();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err?.error?.message || `HTTPエラー ${res.status}`;
        addMessage('assistant', `エラー: ${msg}`, true);
        history.pop();
      } else {
        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text ?? '(応答なし)';
        history.push({ role: 'model', parts: [{ text: reply }] });
        addMessage('assistant', reply);
      }
    } catch (e) {
      removeTypingIndicator();
      addMessage('assistant', `通信エラー: ${e.message}`, true);
      history.pop();
    }

    isLoading = false;
    updateUI();
    userInput.focus();
  }

  loadSettings();
</script>
</body>
</html>
