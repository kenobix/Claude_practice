<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI箱庭 - シミュレーション再生（Google Map版）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100dvh; display: flex; flex-direction: column; }
  header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 16px; }
  header input[type="password"], header input[type="file"] { font-size: 13px; padding: 4px 8px; }
  #load-key-btn { font-size: 13px; padding: 5px 12px; cursor: pointer; }
  #main { flex: 1; display: flex; min-height: 0; }
  #map { flex: 1; }
  #side-panel { width: 320px; border-left: 1px solid #e5e5e5; overflow-y: auto; padding: 12px; font-size: 13px; background: #fafafa; }
  #side-panel h2 { font-size: 14px; margin-bottom: 8px; }
  .persona-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .persona-card .name { font-weight: 600; margin-bottom: 4px; }
  .persona-card .reason { color: #555; margin-top: 4px; line-height: 1.5; }
  .persona-card .meta { color: #888; font-size: 11px; margin-top: 4px; }
  #controls { background: #fff; border-top: 1px solid #e5e5e5; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
  #time-slider { flex: 1; }
  #time-label { font-size: 13px; min-width: 160px; }
  .badge-store { background: #e8f0fe; color: #1a73e8; border-radius: 8px; padding: 1px 6px; font-size: 11px; margin-left: 4px; }
  #note { font-size: 12px; color: #888; padding: 8px 16px; background: #fff8e1; border-bottom: 1px solid #f0e0a0; }
</style>
</head>
<body>

<header>
  <h1>🗺️ AI箱庭 シミュレーション再生（Google Map版）</h1>
  <input type="password" id="maps-key-input" placeholder="Maps JavaScript APIキー">
  <button id="load-key-btn">地図を読み込む</button>
  <input type="file" id="file-input" accept="application/json" disabled>
  <span id="status" style="font-size:12px;color:#888;"></span>
</header>
<div id="note">
  ここで入力するAPIキーは「Maps JavaScript API」専用キーを使ってください（Places API用キーとは別物）。
  キーはブラウザのlocalStorageにのみ保存されます。HTTPリファラー制限をかけたキーの利用を推奨します。
</div>

<div id="main">
  <div id="map"></div>
  <div id="side-panel">
    <h2>このターンの行動・思考ログ</h2>
    <div id="persona-cards">APIキーを入力し、ログファイルを読み込んでください。</div>
  </div>
</div>

<div id="controls">
  <button id="play-btn" disabled>▶ 再生</button>
  <input type="range" id="time-slider" min="0" max="0" value="0" disabled>
  <span id="time-label">-</span>
</div>

<script>
  const STORAGE_KEY = 'ai_hakoniwa_maps_key';
  const keyInput = document.getElementById('maps-key-input');
  const loadKeyBtn = document.getElementById('load-key-btn');
  const fileInput = document.getElementById('file-input');
  const statusEl = document.getElementById('status');
  const slider = document.getElementById('time-slider');
  const timeLabel = document.getElementById('time-label');
  const playBtn = document.getElementById('play-btn');
  const cardsEl = document.getElementById('persona-cards');

  const colors = ['#e53935', '#1e88e5', '#43a047', '#fb8c00', '#8e24aa'];
  let map = null;
  let log = null;
  let markers = {};
  let storeMarker = null;
  let playing = false;
  let playTimer = null;

  // 保存済みキーがあれば復元
  const savedKey = localStorage.getItem(STORAGE_KEY);
  if (savedKey) keyInput.value = savedKey;

  loadKeyBtn.addEventListener('click', () => {
    const key = keyInput.value.trim();
    if (!key) { alert('Maps JavaScript APIキーを入力してください。'); return; }
    localStorage.setItem(STORAGE_KEY, key);
    loadGoogleMapsScript(key);
  });

  function loadGoogleMapsScript(key) {
    statusEl.textContent = '地図を読み込み中...';
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&callback=onGoogleMapsLoaded`;
    script.async = true;
    script.onerror = () => { statusEl.textContent = '地図の読み込みに失敗しました。APIキーを確認してください。'; };
    document.head.appendChild(script);
  }

  window.onGoogleMapsLoaded = function () {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 35.6595, lng: 139.7005 },
      zoom: 16,
    });
    statusEl.textContent = '地図を読み込みました。ログファイルを選択してください。';
    fileInput.disabled = false;
  };

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || !map) return;
    const text = await file.text();
    log = JSON.parse(text);
    statusEl.textContent = `${file.name} を読み込みました（${log.turns.length}ターン）`;
    initPersonas();
  });

  function initPersonas() {
    Object.values(markers).forEach(m => m.setMap(null));
    markers = {};
    if (storeMarker) storeMarker.setMap(null);

    const store = log.scenario.our_product.store_location;
    map.setCenter({ lat: store.lat, lng: store.lng });

    storeMarker = new google.maps.Marker({
      position: { lat: store.lat, lng: store.lng },
      map,
      label: '🏪',
      title: log.scenario.our_product.store_name,
    });

    log.personas.forEach((p, i) => {
      const color = colors[i % colors.length];
      const marker = new google.maps.Marker({
        position: { lat: p.start_location.lat, lng: p.start_location.lng },
        map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 9,
          fillColor: color,
          fillOpacity: 0.9,
          strokeColor: '#fff',
          strokeWeight: 2,
        },
        title: p.name,
      });
      markers[p.id] = marker;
    });

    slider.max = log.turns.length - 1;
    slider.value = 0;
    slider.disabled = false;
    playBtn.disabled = false;
    renderTurn(0);
  }

  function renderTurn(turnIndex) {
    const turn = log.turns[turnIndex];
    timeLabel.textContent = turn.time;
    cardsEl.innerHTML = '';

    turn.decisions.forEach((d) => {
      const loc = d.location_after;
      const marker = markers[d.persona_id];
      marker.setPosition({ lat: loc.lat, lng: loc.lng });
      marker.setTitle(`${d.persona_name}: ${loc.place_name}（関心度${d.decision.interest_in_our_product}/10）`);

      const card = document.createElement('div');
      card.className = 'persona-card';
      const storeBadge = d.decision.considered_our_product ? '<span class="badge-store">自社製品を検討</span>' : '';
      card.innerHTML = `
        <div class="name">${d.persona_name} ${storeBadge}</div>
        <div>📍 ${loc.place_name}（${d.decision.action_type}）</div>
        <div class="reason">💭 ${d.decision.reason}</div>
        <div class="meta">関心度: ${d.decision.interest_in_our_product}/10</div>
      `;
      cardsEl.appendChild(card);
    });
  }

  slider.addEventListener('input', () => renderTurn(parseInt(slider.value, 10)));

  playBtn.addEventListener('click', () => {
    playing = !playing;
    playBtn.textContent = playing ? '⏸ 停止' : '▶ 再生';
    if (playing) {
      playTimer = setInterval(() => {
        let next = parseInt(slider.value, 10) + 1;
        if (next > parseInt(slider.max, 10)) next = 0;
        slider.value = next;
        renderTurn(next);
      }, 1200);
    } else {
      clearInterval(playTimer);
    }
  });

  if (savedKey) loadGoogleMapsScript(savedKey);
</script>
</body>
</html>
